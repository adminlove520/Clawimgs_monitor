
name: ClawFeeds Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Claw Monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DINGDING_WEBHOOK: ${{ secrets.DINGDING_WEBHOOK }}
          DINGDING_SECRET: ${{ secrets.DINGDING_SECRET }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DINGDING_SWITCH: "ON"
          AI_COMMENT_SWITCH: "ON"
          # 确保其他不需要的推送关闭 (如果 config.yaml 里默认开启了)
          DISCARD_SWITCH: "OFF"
          FEISHU_SWITCH: "OFF"
          TELEGRAM_SWITCH: "OFF"
        run: python Rss_monitor.py --once

      - name: Commit Database Changes
        if: always() 
        run: |
          git config --global user.name 'Claw Monitor Bot'
          git config --global user.email 'bot@noreply.github.com'
          # 检查 articles.db 是否有变化
          if [[ -n $(git status --porcelain articles.db) ]]; then
            git add articles.db
            git commit -m "Update articles database [skip ci]"
            git pull --rebase
            git push
          else
            echo "No changes to database"
          fi
